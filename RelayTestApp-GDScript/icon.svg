<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="18" fill="#1a1e26"/>

  <!-- Blue frame -->
  <rect x="4" y="4" width="120" height="120" rx="15" fill="none" stroke="#00aaff" stroke-width="4"/>

  <!-- Cloud body -->
  <!-- Main cloud silhouette: three bumps on top, flat-ish bottom -->
  <path d="
    M 28 72
    C 28 84, 38 90, 50 90
    L 78 90
    C 90 90, 100 84, 100 72
    C 100 62, 94 55, 85 53
    C 85 42, 77 34, 66 34
    C 60 34, 55 37, 52 42
    C 48 38, 42 36, 36 38
    C 27 40, 22 49, 28 58
    C 24 61, 22 66, 28 72 Z
  " fill="#00aaff"/>

  <!-- Brain fold lines on cloud -->
  <path d="M 38 55 Q 46 49 54 55" stroke="#0077cc" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 54 48 Q 63 42 72 48" stroke="#0077cc" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 70 55 Q 78 49 86 55" stroke="#0077cc" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 34 68 Q 44 62 52 68" stroke="#0077cc" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 66 68 Q 76 62 86 68" stroke="#0077cc" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Lightning bolt (yellow) hanging below cloud -->
  <polygon points="70,88 60,104 67,104 57,122 80,102 71,102 83,88" fill="#ffe600"/>
</svg>
